<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>肝脏代谢数字化孪生系统</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        :root { --bg: #0b0b0b; --card: #1a1a1a; --accent: #4dabf7; --meta-color: #fcc419; --warn: #ff3e3e; --in-color: #51cf66; --out-color: #ff6b6b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #ddd; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        
        /* 左侧面板 */
        #sidebar { width: 280px; padding: 20px; background: #151515; border-right: 1px solid #333; overflow-y: auto; z-index: 10; }
        .event-box { background: #222; border: 1px solid #444; padding: 10px; margin-bottom: 10px; border-radius: 6px; position: relative; display: flex; flex-wrap: wrap; gap: 5px; }
        .event-box label { font-size: 11px; color: #888; display: block; }
        .event-box input, .event-box select { width: 100%; background: #000; border: 1px solid #444; color: #fff; border-radius: 4px; padding: 3px; }
        .remove-btn { position: absolute; right: -5px; top: -5px; background: var(--warn); color: #fff; width: 16px; height: 16px; border-radius: 50%; cursor: pointer; text-align: center; line-height: 14px; font-size: 10px; }

        /* 中间主容器：重构排版为紧凑列 */
        #main-wrapper { flex: 1; overflow: hidden; background: #0f0f0f; position: relative; display: flex; flex-direction: column; }
        
        #top-section {
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            height: 500px; /* 初始总高度：仪表盘350 + 分析区域150 */
            min-height: 350px;
        }

        #dashboard-container { 
            width: 100%; 
            flex: 0 0 350px; /* 仪表盘固定高度 */
            background: #111; 
            border-bottom: 1px solid #333;
        }

        #analysis-container {
            padding: 15px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            overflow-y: auto;
            flex: 1; /* 分析区域占据剩余空间 */
            display: none;
        }

        /* 可拖动分界线 */
        #resizer {
            height: 6px;
            background: #333;
            cursor: ns-resize;
            width: 100%;
            transition: background 0.2s;
            z-index: 100;
        }
        #resizer:hover { background: var(--accent); }

        #viz-root { 
            padding: 20px; 
            display: flex; 
            flex-direction: row; 
            align-items: flex-start; 
            gap: 20px; 
            flex: 1;
            overflow-y: auto; /* 反应框区域独立滚动 */
        }
        /* 每一列独立排版，不强制行对齐 */
        .viz-column { flex: 1; display: flex; flex-direction: column; gap: 15px; min-width: 250px; }

        /* 模块样式：内部设为两列 */
        .module-node { background: rgba(255,255,255,0.03); border: 1px solid #333; border-radius: 8px; width: 100%; transition: all 0.3s; }
        .module-title { background: #252525; padding: 8px; cursor: pointer; text-align: center; font-weight: bold; border-radius: 8px 8px 0 0; font-size: 0.9em; }
        .children { padding: 10px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; align-items: start; }
        .collapsed > .children { display: none !important; }

        /* 反应卡片 */
        .reaction-card { background: var(--card); border: 1px solid #444; border-radius: 6px; padding: 10px; transition: all 0.2s; cursor: pointer; position: relative; grid-column: span 1; }
        .reaction-card:hover { border-color: #666; }
        .rate-val { font-family: monospace; font-size: 1.05em; color: var(--accent); margin: 4px 0; }

        /* 子反应展开后的输入输出区分 */
        .reaction-details { display: none; margin-top: 8px; border-top: 1px dashed #444; padding-top: 8px; text-align: left; }
        .reaction-card.expanded .reaction-details { display: block; }
        .detail-badge { 
            display: inline-block; padding: 2px 5px; border-radius: 3px; font-size: 0.75em; margin: 2px; 
            border: 1px solid rgba(255,255,255,0.1);
        }
        .badge-in { background: rgba(81, 207, 102, 0.2); color: #8ce99a; border-color: var(--in-color); }
        .badge-out { background: rgba(255, 107, 107, 0.2); color: #ff8787; border-color: var(--out-color); }

        /* 右侧面板 */
        #metabolite-panel { width: 250px; background: #151515; border-left: 1px solid #333; padding: 20px; overflow-y: auto; z-index: 10; display: flex; flex-direction: column; }
        #meta-search-container { margin-bottom: 15px; position: relative; }
        #meta-search-input { width: 100%; background: #000; border: 1px solid #444; color: #fff; border-radius: 4px; padding: 8px; box-sizing: border-box; }
        #meta-search-results { 
            position: absolute; top: 100%; left: 0; right: 0; background: #222; border: 1px solid #444; 
            max-height: 200px; overflow-y: auto; z-index: 100; display: none; 
        }
        .search-result-item { padding: 8px; cursor: pointer; border-bottom: 1px solid #333; }
        .search-result-item:hover { background: #333; }

        .meta-item { 
            background: #222; 
            border: 2px solid #444; 
            border-radius: 8px; 
            padding: 12px; 
            margin-bottom: 10px; 
            cursor: pointer; 
            transition: all 0.3s;
            position: relative;
        }
        .meta-item.active {
            transform: scale(1.05);
            border-color: var(--accent);
        }
        .meta-item .remove-meta {
            position: absolute; right: 5px; top: 5px; color: #888; cursor: pointer; font-size: 14px;
        }
        .meta-item .remove-meta:hover { color: var(--warn); }

        input[type="range"] {
            -webkit-appearance: none;
            background: #333;
            height: 6px;
            border-radius: 3px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }

        /* 越限警告样式：仅针对边框、阴影和文字颜色，不触碰背景色 */
        .meta-item.warning { 
            border: 2px solid var(--warn) !important; 
            box-shadow: 0 0 15px rgba(255, 62, 62, 0.5);
        }
        .meta-item.warning .meta-name { color: var(--warn); }
        .meta-item.warning .meta-val { color: var(--warn); font-weight: bold; }

        .meta-name { font-size: 0.8em; color: var(--meta-color); font-weight: bold; transition: color 0.3s; }
        .meta-val { font-family: monospace; font-size: 1.2em; transition: color 0.3s; }

        /* 开关样式 */
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.9em; }
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 4px; bottom: 4px; background-color: white; transition: .4s; }
        input:checked + .slider { background-color: var(--accent); }
        input:focus + .slider { box-shadow: 0 0 1px var(--accent); }
        input:checked + .slider:before { transform: translateX(14px); }
        .slider.round { border-radius: 20px; }
        .slider.round:before { border-radius: 50%; }

        #svg-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 5; }
        .flux-line { fill: none; stroke-dasharray: 8, 4; opacity: 0.7; transition: stroke-width 0.2s; }
        button { width: 100%; padding: 10px; background: var(--accent); border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; color: #000; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>模拟配置</h3>
    <label>总时长 (min)</label>
    <input type="number" id="total_duration" value="120">
    <h3 style="margin-top:20px;">事件调度</h3>
    <div id="event-list"></div>
    <button id="add-event-btn" onclick="addEvent()">+ 添加注入事件</button>
    <button onclick="startSimulation()" style="background: #40c057; margin-top: 20px; color: white;">▶ 开始模拟</button>
    <div id="timer" style="margin-top:20px; text-align:center; color: var(--accent); font-size: 1.2em;">时间: 0 min</div>
    
    <div id="replay-control" style="margin-top:20px;">
        <label style="font-size:0.8em; color:#888;">模拟重放进度</label>
        <input type="range" id="progress-slider" min="0" max="0" value="0" style="width:100%; margin-top:5px;">
    </div>

    <h3 style="margin-top:20px;">显示设置</h3>
    <div class="setting-item">
        <label for="toggle-flux-lines">显示物质连线</label>
        <label class="switch">
            <input type="checkbox" id="toggle-flux-lines" checked>
            <span class="slider round"></span>
        </label>
    </div>
    <button onclick="clearAnalysis()" style="background: #868e96; margin-top: 10px;">清空分析标记</button>
</div>

<div id="main-wrapper">
    <div id="top-section">
        <div id="dashboard-container"></div>
        <div id="analysis-container">
            <h4 style="margin: 0 0 10px 0; color: var(--accent); display: flex; justify-content: space-between;">
                <span>追溯分析: <span id="analysis-target">-</span></span>
                <span id="analysis-range" style="font-size: 0.8em; color: #888;"></span>
            </h4>
            <div id="analysis-content" style="font-size: 0.9em; line-height: 1.6; color: #bbb;">
                等待选择时间段...
            </div>
        </div>
    </div>
    <div id="resizer"></div>
    <div id="viz-root"></div>
</div>

<div id="metabolite-panel">
    <h3>物质浓度</h3>
    <div id="meta-search-container">
        <input type="text" id="meta-search-input" placeholder="搜索物质并添加...">
        <div id="meta-search-results"></div>
    </div>
    <div id="meta-list"></div>
</div>
<svg id="svg-overlay"></svg>

<script>
    const socket = io();
    let config = null;
    let selectedMetabolite = null;
    let highlightedTrace = { index: -1, originalWidth: null };
    let timeMarkers = [];
    let allMetaboliteKeys = [];
    let activeMetabolites = new Set(['glucose', 'insulin', 'glucagon']); // 默认显示的物质
    let dashboardMetabolites = new Set(['glucose', 'insulin', 'glucagon']); // 仪表盘显示的物质
    let dashboardRates = new Set(['hexokinase']); // 仪表盘显示的反应

    // 仪表盘历史数据
    let dashboardHistory = {
        time: [],
        data: {} // 动态存储 { key: [values] }
    };
    let allSimulationFrames = []; // 存储每一帧的完整快照，用于重放
    let isReplaying = false;
    let showFluxLines = true;

    function initDashboard() {
        const traces = [];
        const currentIndex = parseInt(document.getElementById('progress-slider').value) || 0;
        const historyTimes = dashboardHistory.time.slice(0, currentIndex + 1);

        // 左侧物质曲线
        dashboardMetabolites.forEach(m => {
            const isHormone = m === 'insulin' || m === 'glucagon';
            traces.push({
                x: historyTimes,
                y: dashboardHistory.data[m] ? dashboardHistory.data[m].slice(0, currentIndex + 1) : [],
                name: m.toUpperCase(),
                line: { width: 2, dash: isHormone ? 'dot' : 'solid' },
                xaxis: 'x', yaxis: isHormone ? 'y2' : 'y'
            });
        });

        // 右侧反应速率曲线
        dashboardRates.forEach(r => {
            traces.push({
                x: historyTimes,
                y: dashboardHistory.data[r] ? dashboardHistory.data[r].slice(0, currentIndex + 1) : [],
                name: `Rate: ${r}`,
                line: { width: 2 },
                xaxis: 'x2', yaxis: 'y3'
            });
        });

        const layout = {
            paper_bgcolor: 'rgba(0,0,0,0)',
            plot_bgcolor: 'rgba(0,0,0,0)',
            showlegend: true,
            legend: { 
                font: { color: '#aaa', size: 10 }, 
                orientation: 'h', 
                y: -0.2,
                x: 0.5,
                xanchor: 'center'
            },
            xaxis: { 
                domain: [0, 0.45],
                title: '时间 (min)', titlefont: { size: 10 },
                color: '#666', gridcolor: '#222', zeroline: false 
            },
            yaxis: { 
                title: '浓度 (mmol/L)', titlefont: { size: 10 },
                color: '#666', gridcolor: '#222', zeroline: false 
            },
            yaxis2: { 
                title: '激素强度', titlefont: { size: 10 },
                color: '#666', overlaying: 'y', side: 'right', 
                gridcolor: 'transparent', zeroline: false 
            },
            xaxis2: { 
                domain: [0.55, 1],
                title: '时间 (min)', titlefont: { size: 10 },
                color: '#666', gridcolor: '#222', zeroline: false 
            },
            yaxis3: { 
                anchor: 'x2',
                title: '速率 (mmol/L/min)', titlefont: { size: 10 },
                color: '#666', gridcolor: '#222', zeroline: false 
            },
            margin: { t: 40, b: 60, l: 50, r: 50 },
            annotations: [
                {
                    text: "关键代谢物与激素 (双击添加)",
                    font: { size: 13, color: '#eee', weight: 'bold' },
                    showarrow: false,
                    xref: 'paper', yref: 'paper',
                    x: 0.2, y: 1.1
                },
                {
                    text: "关键反应速率 (双击添加)",
                    font: { size: 13, color: '#eee', weight: 'bold' },
                    showarrow: false,
                    xref: 'paper', yref: 'paper',
                    x: 0.8, y: 1.1
                }
            ]
        };

        Plotly.newPlot('dashboard-container', traces, layout, {displayModeBar: false});

        document.getElementById('dashboard-container').on('plotly_click', (data) => {
            if (!selectedMetabolite) return;
            const point = data.points[0];
            if (point.xaxis.anchor === 'y') { // 确保点击在物质浓度图上
                handleTimeMarker(point.x);
            }
        });
    }

    window.onload = async () => {
        const response = await fetch('/get_config');
        config = await response.json();
        
        const metas = new Set();
        Object.values(config.reactions).forEach(r => Object.keys(r.flux).forEach(m => metas.add(m)));
        allMetaboliteKeys = Array.from(metas).sort();

        initDashboard();
        initSearch();
        renderTree();
        initMetabolites();
        addEvent(); 
        
        const slider = document.getElementById('progress-slider');
        slider.oninput = () => {
            const index = parseInt(slider.value);
            if (index < allSimulationFrames.length) {
                isReplaying = (index < allSimulationFrames.length - 1);
                renderFrame(index);
            }
        };

        // 实现 Resizer 拖拽逻辑
        const resizer = document.getElementById('resizer');
        const topSection = document.getElementById('top-section');
        let isResizing = false;

        resizer.onmousedown = (e) => {
            isResizing = true;
            document.body.style.cursor = 'ns-resize';
        };

        document.onmousemove = (e) => {
            if (!isResizing) return;
            const mainWrapper = document.getElementById('main-wrapper');
            const mainRect = mainWrapper.getBoundingClientRect();
            
            // 计算新的顶部高度
            let newTopHeight = e.clientY - mainRect.top;
            
            // 限制高度范围
            const minHeight = 350; // 至少显示仪表盘
            const maxHeight = mainRect.height - 100; // 留出反应框空间
            
            newTopHeight = Math.max(minHeight, Math.min(newTopHeight, maxHeight));
            topSection.style.height = `${newTopHeight}px`;
            
            // 重新调整仪表盘大小
            Plotly.Plots.resize('dashboard-container');
            updateLines();
        };

        document.onmouseup = () => {
            if (isResizing) {
                isResizing = false;
                document.body.style.cursor = 'default';
            }
        };

        document.getElementById('viz-root').onscroll = updateLines;
        window.onresize = () => {
            updateLines();
            Plotly.Plots.resize('dashboard-container');
        };

        // 初始化连线显示开关
        const toggleFluxLines = document.getElementById('toggle-flux-lines');
        toggleFluxLines.checked = showFluxLines;
        toggleFluxLines.onchange = () => {
            showFluxLines = toggleFluxLines.checked;
            updateLines();
        };
    };

    function renderFrame(index) {
        const data = allSimulationFrames[index];
        if (!data) return;

        document.getElementById('timer').innerText = `时间: ${data.minute} min`;
        document.getElementById('progress-slider').value = index;

        // 1. 更新仪表盘曲线：从 dashboardHistory 中切片
        const xData = [];
        const yData = [];
        
        const historyTimes = dashboardHistory.time.slice(0, index + 1);
        
        dashboardMetabolites.forEach(m => {
            xData.push(historyTimes);
            yData.push(dashboardHistory.data[m] ? dashboardHistory.data[m].slice(0, index + 1) : []);
        });
        dashboardRates.forEach(r => {
            xData.push(historyTimes);
            yData.push(dashboardHistory.data[r] ? dashboardHistory.data[r].slice(0, index + 1) : []);
        });

        const gd = document.getElementById('dashboard-container');
        if (gd && gd.data && gd.data.length === xData.length) {
            Plotly.update('dashboard-container', { x: xData, y: yData });
        }

        // 2. 更新反应卡片
        Object.entries(data.rates).forEach(([key, val]) => {
            const el = document.getElementById(`rate-${key}`);
            const card = document.getElementById(`card-${key}`);
            if (el && card) {
                el.innerText = val.toFixed(4);
                if (Math.abs(val) < 0.00001) { 
                    card.style.backgroundColor = `var(--card)`;
                    card.style.borderColor = `#444`;
                } else {
                    const clamped = Math.max(-0.1, Math.min(0.1, val));
                    const intensity = Math.abs(clamped) / 0.1;
                    if (val > 0) {
                        card.style.backgroundColor = `rgba(77, 171, 247, ${intensity * 0.3})`;
                        card.style.borderColor = `rgba(77, 171, 247, ${0.3 + intensity * 0.4})`;
                    } else {
                        card.style.backgroundColor = `rgba(255, 62, 62, ${intensity * 0.3})`;
                        card.style.borderColor = `rgba(255, 62, 62, ${0.3 + intensity * 0.4})`;
                    }
                }
            }
        });
        
        // 3. 更新物质卡片
        Object.entries(data.metabolites).forEach(([m, val]) => {
            const el = document.getElementById(`val-${m}`);
            const box = document.getElementById(`meta-${m}`);
            if (el && box) {
                el.innerText = val.toFixed(2);
                const constraint = config.constraints[m];
                if (constraint) {
                    const {min, max} = constraint;
                    if (val < min || val > max) box.classList.add('warning');
                    else box.classList.remove('warning');
                    const rangePercent = Math.max(0, Math.min(1, (val - min) / (max - min)));
                    box.style.backgroundColor = `rgba(252, 196, 25, ${rangePercent * 0.4})`;
                }
            }
        });

        // 4. 更新连线
        updateLines();
    }

    function initSearch() {
        const input = document.getElementById('meta-search-input');
        const results = document.getElementById('meta-search-results');

        input.oninput = () => {
            const val = input.value.toLowerCase();
            if (!val) {
                results.style.display = 'none';
                return;
            }
            const filtered = allMetaboliteKeys.filter(m => m.toLowerCase().includes(val));
            results.innerHTML = filtered.map(m => `<div class="search-result-item">${m}</div>`).join('');
            results.style.display = 'block';

            document.querySelectorAll('.search-result-item').forEach(item => {
                item.onclick = () => {
                    addActiveMetabolite(item.innerText);
                    input.value = '';
                    results.style.display = 'none';
                };
            });
        };

        document.onclick = (e) => {
            if (e.target !== input) results.style.display = 'none';
        };
    }

    function addActiveMetabolite(m) {
        if (activeMetabolites.has(m)) return;
        activeMetabolites.add(m);
        renderActiveMetabolites();
    }

    function removeActiveMetabolite(m) {
        activeMetabolites.delete(m);
        if (selectedMetabolite === m) selectedMetabolite = null;
        renderActiveMetabolites();
        updateLines();
    }

    function renderActiveMetabolites() {
        const list = document.getElementById('meta-list');
        list.innerHTML = '';
        activeMetabolites.forEach(m => {
            const div = document.createElement('div');
            div.className = 'meta-item'; 
            if (selectedMetabolite === m) div.classList.add('active');
            div.id = `meta-${m}`;
            div.innerHTML = `
                <span class="remove-meta" onclick="event.stopPropagation(); removeActiveMetabolite('${m}')">✕</span>
                <div class="meta-name">${m.toUpperCase()}</div>
                <div class="meta-val" id="val-${m}">0.00</div>`;
            
            div.onclick = () => {
                document.querySelectorAll('.meta-item').forEach(el => el.classList.remove('active'));
                
                if (selectedMetabolite === m) {
                    selectedMetabolite = null;
                    toggleHighlight(null); // 取消高亮
                } else {
                    selectedMetabolite = m;
                    div.classList.add('active');
                    toggleHighlight(m); // 设置高亮
                }
                updateLines();
                performTraceAnalysis();
            };

            div.ondblclick = () => {
                if (dashboardMetabolites.has(m)) {
                    dashboardMetabolites.delete(m);
                } else {
                    dashboardMetabolites.add(m);
                }
                initDashboard();
            };

            list.appendChild(div);
        });
    }

    function toggleHighlight(metaboliteName) {
        const gd = document.getElementById('dashboard-container');
        if (!gd.data) return;

        // 恢复之前高亮的曲线
        if (highlightedTrace.index !== -1) {
            Plotly.restyle(gd, { 'line.width': highlightedTrace.originalWidth }, highlightedTrace.index);
            highlightedTrace.index = -1;
        }

        if (metaboliteName) {
            const traceIndex = gd.data.findIndex(trace => trace.name === metaboliteName.toUpperCase());
            if (traceIndex !== -1) {
                highlightedTrace.index = traceIndex;
                highlightedTrace.originalWidth = gd.data[traceIndex].line.width;
                Plotly.restyle(gd, { 'line.width': highlightedTrace.originalWidth * 2.5 }, traceIndex);
            }
        }
    }

    function handleTimeMarker(time) {
        if (timeMarkers.length >= 2) {
            timeMarkers.shift(); // 移除最老的时间点
        }
        timeMarkers.push(time);
        updateAnalysisPeriod();
    }

    function updateAnalysisPeriod() {
        const gd = document.getElementById('dashboard-container');
        const newLayout = {
            shapes: [],
        };

        if (timeMarkers.length > 0) {
            timeMarkers.forEach(t => {
                newLayout.shapes.push({
                    type: 'line',
                    x0: t, x1: t, y0: 0, y1: 1, yref: 'paper',
                    line: { color: '#cccccc', width: 1, dash: 'dash' }
                });
            });
        }

        if (timeMarkers.length === 2) {
            newLayout.shapes.push({
                type: 'rect',
                x0: Math.min(...timeMarkers), x1: Math.max(...timeMarkers),
                y0: 0, y1: 1, yref: 'paper',
                fillcolor: 'rgba(255, 255, 255, 0.05)',
                layer: 'below',
                line: { width: 0 }
            });
            performTraceAnalysis();
        }

        Plotly.relayout(gd, newLayout);
    }

    function performTraceAnalysis() {
        if (!selectedMetabolite || timeMarkers.length !== 2) {
            document.getElementById('analysis-container').style.display = 'none';
            return;
        }

        const t_start = Math.min(...timeMarkers);
        const t_end = Math.max(...timeMarkers);
        
        // 筛选时间范围内的记录
        const range_frames = allSimulationFrames.filter(f => f.minute >= t_start && f.minute <= t_end);
        if (range_frames.length < 2) return;

        const val_start = range_frames[0].metabolites[selectedMetabolite] || 0;
        const val_end = range_frames[range_frames.length - 1].metabolites[selectedMetabolite] || 0;
        const total_delta = val_end - val_start;

        // 累计反应贡献
        const cumulative_impacts = {};
        range_frames.forEach(frame => {
            const audit = frame.audit || {};
            Object.entries(audit).forEach(([rxn_name, outputs]) => {
                if (outputs[selectedMetabolite] !== undefined) {
                    cumulative_impacts[rxn_name] = (cumulative_impacts[rxn_name] || 0) + outputs[selectedMetabolite];
                }
            });
        });

        // 排序贡献
        const sorted_impacts = Object.entries(cumulative_impacts)
            .sort((a, b) => Math.abs(b[1]) - Math.abs(a[1]))
            .slice(0, 8);

        // 更新 UI
        const container = document.getElementById('analysis-container');
        container.style.display = 'block';
        document.getElementById('analysis-target').innerText = selectedMetabolite.toUpperCase();
        document.getElementById('analysis-range').innerText = `${t_start.toFixed(1)} - ${t_end.toFixed(1)} min`;

        let html = `<div style="margin-bottom: 8px;">总变化量: <b style="color: ${total_delta >= 0 ? '#51cf66' : '#ff6b6b'}">${total_delta.toFixed(4)}</b> mmol/L</div>`;
        html += `<div style="display: grid; grid-template-columns: 1fr auto; gap: 5px 15px;">`;
        
        sorted_impacts.forEach(([name, val]) => {
            const rxn_config = config.reactions[name] || { display_name: name };
            const color = val >= 0 ? '#51cf66' : '#ff6b6b';
            const contribution_percent = total_delta !== 0 ? (val / total_delta * 100).toFixed(1) : '0';
            html += `<span style="color: #888;">${rxn_config.display_name}</span>
                     <span style="color: ${color}; font-family: monospace; text-align: right;">
                        ${val > 0 ? '+' : ''}${val.toFixed(4)} 
                        <span style="font-size: 0.8em; color: #666; margin-left: 5px;">(${contribution_percent}%)</span>
                     </span>`;
        });
        html += `</div>`;
        
        document.getElementById('analysis-content').innerHTML = html;
    }

    function clearAnalysis() {
        timeMarkers = [];
        document.getElementById('analysis-container').style.display = 'none';
        updateAnalysisPeriod();
    }

    function addEvent() {
        const options = allMetaboliteKeys.map(m => `<option value="${m}">${m}</option>`).join('');
        const div = document.createElement('div');
        div.className = 'event-box';
        div.innerHTML = `<span class="remove-btn" onclick="this.parentElement.remove()">✕</span>
            <div style="flex:1"><label>时刻</label><input type="number" class="ev-time" value="10"></div>
            <div style="flex:2"><label>物质</label><select class="ev-sub">${options}</select></div>
            <div style="flex:1"><label>剂量</label><input type="number" class="ev-amt" value="5"></div>`;
        document.getElementById('event-list').appendChild(div);
    }

    function buildNode(id) {
        if (config.reactions[id]) {
            const r = config.reactions[id];
            const card = document.createElement('div');
            card.className = 'reaction-card';
            card.id = `card-${r.rate_key}`;
            card.onclick = (e) => { 
                e.stopPropagation();
                card.classList.toggle('expanded'); 
                setTimeout(updateLines, 50); 
            };
            card.ondblclick = (e) => {
                e.stopPropagation();
                if (dashboardRates.has(r.rate_key)) {
                    dashboardRates.delete(r.rate_key);
                } else {
                    dashboardRates.add(r.rate_key);
                }
                initDashboard();
            };

            // 区分输入输出 Badge
            const detailHtml = Object.entries(r.flux).map(([m, coeff]) => {
                const typeClass = coeff < 0 ? 'badge-in' : 'badge-out';
                const label = coeff < 0 ? '消耗' : '产出';
                return `<div class="detail-badge ${typeClass}">${m} (${label})</div>`;
            }).join('');

            card.innerHTML = `<div style="font-size:0.85em; font-weight:600;">${r.display_name}</div>
                <div class="rate-val" id="rate-${r.rate_key}">0.0000</div>
                <div class="reaction-details">${detailHtml}</div>`;
            return card;
        }

        const data = config.hierarchy[id];
        const container = document.createElement('div');
        container.className = 'module-node';
        const title = document.createElement('div');
        title.className = 'module-title';
        title.innerText = data.label;
        title.onclick = (e) => { 
            e.stopPropagation();
            container.classList.toggle('collapsed'); 
            setTimeout(updateLines, 50); 
        };
        const childrenDiv = document.createElement('div');
        childrenDiv.className = 'children';
        
        // 子模块排列：递归渲染
        data.children.forEach(cid => {
            if(config.hierarchy[cid] || config.reactions[cid]) {
                childrenDiv.appendChild(buildNode(cid));
            }
        });
        
        container.appendChild(title);
        container.appendChild(childrenDiv);
        return container;
    }

    function renderTree() {
        const root = document.getElementById('viz-root');
        root.innerHTML = '';
        const topLevels = Object.keys(config.hierarchy).filter(id => 
            !Object.values(config.hierarchy).some(h => h.children.includes(id)));
        
        // 创建三列布局实现紧凑排版
        const colCount = 3;
        const columns = [];
        for(let i=0; i<colCount; i++) {
            const col = document.createElement('div');
            col.className = 'viz-column';
            root.appendChild(col);
            columns.push(col);
        }

        topLevels.forEach((id, index) => {
            columns[index % colCount].appendChild(buildNode(id));
        });
    }

    function initMetabolites() {
        renderActiveMetabolites();
    }

    socket.on('rate_update', (data) => {
        // 存储当前帧数据
        allSimulationFrames.push(data);
        
        // 更新历史数据（用于 Plotly）
        dashboardHistory.time.push(data.minute);
        Object.entries(data.metabolites).forEach(([m, val]) => {
            if (!dashboardHistory.data[m]) dashboardHistory.data[m] = [];
            dashboardHistory.data[m].push(val);
        });
        Object.entries(data.rates).forEach(([r, val]) => {
            if (!dashboardHistory.data[r]) dashboardHistory.data[r] = [];
            dashboardHistory.data[r].push(val);
        });

        // 更新进度条最大值
        const slider = document.getElementById('progress-slider');
        slider.max = allSimulationFrames.length - 1;

        // 如果不是在重放模式，则更新 UI 到最新帧
        if (!isReplaying) {
            renderFrame(allSimulationFrames.length - 1);
        }
    });

    function updateLines() {
        const svg = document.getElementById('svg-overlay');
        svg.innerHTML = '';
        if (!selectedMetabolite || !showFluxLines) return;
        const metaEl = document.getElementById(`meta-${selectedMetabolite}`);
        if(!metaEl) return;
        const mRect = metaEl.getBoundingClientRect();

        Object.values(config.reactions).forEach(r => {
            const coeff = r.flux[selectedMetabolite];
            const card = document.getElementById(`card-${r.rate_key}`);
            if (coeff === undefined || !card || card.offsetParent === null) return;
            
            const cRect = card.getBoundingClientRect();
            const rateVal = parseFloat(document.getElementById(`rate-${r.rate_key}`).innerText) || 0;

            // 逻辑修改：
            // 绿色线 = 反应从池中拿取 (coeff < 0)
            // 红色线 = 反应向池中输出 (coeff > 0)
            const isTakingFromPool = coeff < 0;
            
            // 确定起点终点坐标 (连接到卡片右侧)
            const cardX = cRect.right;
            const cardY = cRect.top + cRect.height/2;
            const poolX = mRect.left;
            const poolY = mRect.top + mRect.height/2;

            let sX, sY, eX, eY, color;

            if (isTakingFromPool) {
                // 物质 -> 反应 (拿取)
                sX = poolX; sY = poolY;
                eX = cardX; eY = cardY;
                color = "#51cf66"; // 绿色
            } else {
                // 反应 -> 物质 (输出)
                sX = cardX; sY = cardY;
                eX = poolX; eY = poolY;
                color = "#ff6b6b"; // 红色
            }

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            // 贝塞尔曲线控制点
            const cp1x = sX + (eX - sX) * 0.5;
            const cp2x = sX + (eX - sX) * 0.5;
            
            path.setAttribute("d", `M ${sX} ${sY} C ${cp1x} ${sY}, ${cp2x} ${eY}, ${eX} ${eY}`);
            path.setAttribute("class", "flux-line");
            path.setAttribute("stroke", color);
            
            // 粗细代表速率绝对值
            const thickness = 1 + Math.min(Math.abs(rateVal) * 20, 8);
            path.setAttribute("stroke-width", thickness);
            svg.appendChild(path);
        });
    }

    function startSimulation() {
        // 清空历史记录
        dashboardHistory = {
            time: [], data: {}
        };
        allSimulationFrames = [];
        isReplaying = false;
        timeMarkers = [];
        document.getElementById('progress-slider').max = 0;
        document.getElementById('progress-slider').value = 0;
        document.getElementById('analysis-container').style.display = 'none';
        
        initDashboard();

        const events = Array.from(document.querySelectorAll('.event-box')).map(el => ({
            time: el.querySelector('.ev-time').value,
            substance: el.querySelector('.ev-sub').value,
            amount: el.querySelector('.ev-amt').value
        }));
        socket.emit('start_simulation', {
            duration: document.getElementById('total_duration').value,
            events: events
        });
    }
</script>
