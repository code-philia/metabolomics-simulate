add_track: |
  - 参考 code/utils.py 中的generate_dashboard函数，修改code/web/liver_server.py 和 code/web/templates/index.html，在网页的中部区域上部增加一个区域，添加实时的交互式可视化仪表盘曲线绘制。
    - 修改实时的交互式可视化仪表盘中的反应速率曲线，使其从错误的起始位置（现在从代谢物曲线原点开始画了）改为正确的右表起始位置
    - 1）将右侧物质浓度区域的显示逻辑改为：通过一个合并下拉选择与搜索的框，将想要查看的物质添加至下方区域中，可添加多个，每个物质的框上有叉叉可以从显示区域挪除。
      2）物质显示的基本逻辑改变为：单击仍然显示与反应的连线；新增双击后在实时的交互式可视化仪表盘左侧显示浓度曲线。
      3）反应框同样修改逻辑：单击仍然显示输入输出不变；新增双击后在实时的交互式可视化仪表盘右侧显示速率曲线。
        - 修复一次模拟后双击物质框或反应框仪表盘显示被重置的bug。
        - 继续修复bug：
          1）一次模拟后双击物质框或反应框，仪表盘不显示新增曲线；
          2）模拟中双击反应框，新增的速率曲线坐标错误
    - 模拟中存储所有结果，并添加模拟的进度条，拖动可以重放网页的可视化图表变化。**注意数据传入的方式**

    - 新增功能：
      0）在右侧物质栏中，单击可选中其中一个物质，新增在交互式可视化仪表盘中为该物质所在的浓度曲线添加高亮效果；再次单击取消选中；单击其他曲线时同时切换高亮曲线；已实现的物质-反应虚线连线逻辑维持不变。
      1）单击选中右侧物质栏中的一个物质时，将物质框变大少许以凸显选择；选择后的显示逻辑不变。
      2）在存在选中并高亮的某物质时，单击交互式可视化仪表盘中的物质浓度图上任意空白位置，会设置所在的横轴位置为一个时间t1，在图上用竖线标记；再次单击另一个空白位置同样标记时间t2，即划出了一个分析时间段t1~t2或t2~t1，时间段内的表格区域铺色显示；单击三次时，取消t1的标记并根据t2、t3更新标记和铺色，更多次双击同理；选择另一个物质时，保留之前的分析时间段。
        - 继续，当前任务2未完成，点击无垂直线显示。
      3）修改时间段垂直线的颜色为亮灰色，避免被隐藏在黑色的背景中。
      4）参考code/analyzer.py中追溯功能的实现，新增功能：在中部显示的上部区域、仪表盘下方，新增一个分析输出区域：当划出或更新分析时间段 / 存在分析时间段但选择另一个物质浓度曲线时，针对当前选中的物质，追溯该物质变化的累计贡献原因，并打印在输出区域中。

    - 继续优化网页设置：
      0）增加分析输出区域的高度，并将“仪表盘+分析输出区域”与“反应框区域”的分界线设置为可以移动的，向下移动可扩展分析输出区域的高度。
      1）在左侧栏中，增加清空分析和时间段区域标记的开关；
      2）在左侧栏中，增加隐藏或显示物质-反应虚线连线的开关。


add_group: |
  - 修改code/web/liver_server.py 和 code/web/templates/index.html，使网页：
    1）交互式可视化仪表盘和分析输出区域作为一个大元素“组”下的子元素，一个组代表一个同步模拟，各组在中上部区域纵向排列，支持新建组/关闭组；**其余网页布局和逻辑不变**
    2）每个模拟组增加编辑环境参数的开关，控制不同环境参数下的同输入模拟；中部下方的反应框区域和右侧物质区域默认显示第一个组中的浓度和速率变化，当点击某个组时，切换至该组显示。**其余网页布局和逻辑不变**
    
  - 修复bug：
    1）进度条移到“分析时间段”的结束时间之前时，交互式可视化仪表盘中的物质浓度曲线不能自动取消本应在图外的垂线标记和铺色（保持当前分析不变，调整仪表盘中的可视化）
    2）右侧新增或删除物质时，其浓度显示会归0，直到手动拖动进度条；**不能影响正常模拟的开始和进度条的拖动**
  - 继续优化网页设置：
    1）为每个模拟组的分析输出区域增加折叠/展开开关。
    2）在左侧栏中，增加网页底色主题（黑/白）开关，**其余网页布局和逻辑不变**；
    3）支持编辑模拟组的名称，并相应改变交互式可视化仪表盘表格上的名称。

  - 修改code/web/liver_server.py 和 code/web/templates/index.html（必要时修改code/simulate.py），使：
    1）模拟时，可以为每个最底层的叶子反应函数各自设置一个激活值，作为手动设置的反应速率权重；
    2）在每一个模拟组编辑环境参数时，提供一个合并下拉选择与搜索所有反应的框以方便地设置它们的权重。
  - 参考code/web/simulate_interface.json，将手动设置的反应速率权重继续写入code/simulate.py中的其他叶子反应函数。
      - 修复bug：网页端选择并改变某反应权重后，模拟中不起效（环境参数的设置是起效的）


