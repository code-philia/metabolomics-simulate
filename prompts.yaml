      },
      "orchestrateLipidMetabolism": {
        "label": "脂质代谢",
        "children": ["fattyAcidSynthesis", "betaOxidation"]
      }
    },
    "reactions": {
      "hexokinase": {
        "id": "rate-hexokinase",
        "parent_module": "orchestrateGlycolysis",
        "display_name": "己糖激酶 (HK)",
        "rate_key": "hexokinase",
        "flux": {
          "glucose": -1.0,
          "atp": -1.0,
          "g6p": 1.0,
          "adp": 1.0
        },
        "regulation": "受 G6P 变构抑制，受葡萄糖浓度驱动"
      },
      "pfk1": {
        "id": "rate-pfk1",
        "parent_module": "orchestrateGlycolysis",
        "display_name": "磷酸果糖激酶-1",
        "rate_key": "pfk1",
        "flux": {
          "f6p": -1.0,
          "atp": -1.0,
          "f16bp": 1.0,
          "adp": 1.0
        },
        "regulation": "受 ATP/柠檬酸抑制，受 AMP/F26BP 激活"
      },
      "betaOxidation": {
        "id": "rate-betaOxidation",
        "parent_module": "orchestrateLipidMetabolism",
        "display_name": "脂肪酸 β-氧化",
